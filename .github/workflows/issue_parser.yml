name: Issue Triggered Plan Parser

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  parse-and-commit:
    if: contains(github.event.issue.title, '플랜') || contains(github.event.issue.title, 'plan') || contains(github.event.issue.title, 'Plan')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리를 가져와서 pull/rebase가 가능하게 함

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install Pillow

      - name: Run Issue Parser
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python tools/issue_to_plan.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BibleBot Manager"
          git config --global user.email "actions@github.com"
          
          # 변경사항 확인 및 커밋 후 리베이스 진행
          git add data/plans/*.json
          
          # 변경사항이 있는지 확인
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "feat: generate plan from issue #${{ github.event.issue.number }}"
            # 커밋된 상태에서 원격의 최신 내용을 가져와 내 커밋을 그 위로 옮김 (충돌 방지)
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Close Issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.html_url }} -b "✅ 파싱이 완료되어 새로운 JSON 플랜 파일이 추가되었습니다!"
          gh issue close ${{ github.event.issue.html_url }}
