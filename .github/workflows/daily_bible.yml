name: Daily Bible Sender

on:
  workflow_dispatch: # 자동 발송은 mh_bot systemd timer가 담당. GitHub Actions는 수동 실행 전용.

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      KO_CHAT_ID: ${{ secrets.KO_CHAT_ID }}
      EN_CHAT_ID: ${{ secrets.EN_CHAT_ID }}
      MN_CHAT_ID: ${{ secrets.MN_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache : 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script (Smart Mode)
        run: python main.py
